<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LegalCRM Ecuador</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:14px;color:#1a1a18;background:#f8f7f4;display:flex;height:100vh}

/* NAV */
.nav{width:220px;min-width:220px;background:#fff;border-right:1px solid rgba(0,0,0,.09);display:flex;flex-direction:column;height:100vh}
.nav-logo{padding:18px 16px 14px;border-bottom:1px solid rgba(0,0,0,.09)}
.logo-mark{font-size:13px;font-weight:700;color:#1a4a8a}
.logo-sub{font-size:10px;color:#9e9d98;margin-top:1px;text-transform:uppercase;letter-spacing:.04em}
.nav-body{flex:1;overflow-y:auto;padding:6px 0}
.ns{padding:10px 8px 4px;font-size:10px;font-weight:600;color:#9e9d98;text-transform:uppercase;letter-spacing:.07em}
.ni{display:flex;align-items:center;gap:9px;padding:8px 10px;border-radius:6px;margin:1px 6px;cursor:pointer;color:#6b6a65;font-size:13px;transition:all .12s;user-select:none}
.ni:hover{background:#f2f1ee;color:#1a1a18}
.ni.on{background:#eef3fb;color:#1a4a8a;font-weight:500}
.ni i{font-size:16px;flex-shrink:0}
.nbadge{margin-left:auto;font-size:10px;background:#1a4a8a;color:#fff;border-radius:99px;padding:1px 6px}
.nbadge.red{background:#8a1a1a}
.nav-foot{border-top:1px solid rgba(0,0,0,.09);padding:10px 8px}
.nav-user{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:6px;cursor:pointer}
.nav-user:hover{background:#f2f1ee}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:600;flex-shrink:0}
.un{font-size:12px;font-weight:500}
.ur{font-size:10px;color:#9e9d98}

/* MAIN */
.main{flex:1;display:flex;flex-direction:column;height:100vh;overflow:hidden;min-width:0}

/* TOPBAR */
.topbar{background:#fff;border-bottom:1px solid rgba(0,0,0,.09);height:52px;padding:0 20px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.tb-title{font-size:15px;font-weight:600;flex:1}
.tv{display:flex;gap:2px;background:#f2f1ee;border-radius:6px;padding:3px}
.vb{padding:5px 10px;border-radius:5px;font-size:12px;cursor:pointer;color:#6b6a65;display:flex;align-items:center;gap:5px;border:none;background:transparent;font-family:inherit;transition:all .12s}
.vb.on{background:#fff;color:#1a1a18;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 12px;border-radius:6px;border:1px solid rgba(0,0,0,.16);background:transparent;color:#6b6a65;font-size:12px;cursor:pointer;font-family:inherit;transition:all .12s;white-space:nowrap}
.btn:hover{background:#f2f1ee;color:#1a1a18}
.btnp{background:#1a4a8a;color:#fff;border-color:#1a4a8a}
.btnp:hover{background:#153d76}

/* CONTENT AREA */
.content{flex:1;overflow:hidden;display:flex;position:relative}
.view{position:absolute;inset:0;display:flex;overflow:hidden}
.view.hidden{display:none}

/* PILLS */
.pill{display:inline-block;font-size:10px;padding:2px 8px;border-radius:99px;font-weight:500;white-space:nowrap}
.p-activo{background:#eef3fb;color:#1a4a8a}
.p-nuevo{background:#f2f1ee;color:#6b6a65;border:1px solid rgba(0,0,0,.09)}
.p-espera{background:#fef4e6;color:#8a4f0a}
.p-audiencia{background:#feeeed;color:#8a1a1a}
.p-resuelto{background:#eaf5ee;color:#1a6e3c}
.p-inactivo{background:#f2f1ee;color:#9e9d98;border:1px solid rgba(0,0,0,.09)}
.p-potencial{background:#f0eafb;color:#6b2fb5}
.icon-btn{width:28px;height:28px;border-radius:6px;border:1px solid rgba(0,0,0,.09);background:transparent;display:flex;align-items:center;justify-content:center;cursor:pointer;color:#6b6a65;font-size:14px;transition:all .12s}
.icon-btn:hover{background:#f2f1ee}

/* CASOS LISTA */
.case-sidebar{width:270px;flex-shrink:0;border-right:1px solid rgba(0,0,0,.09);background:#fff;display:flex;flex-direction:column;height:100%}
.case-search{padding:10px 12px;border-bottom:1px solid rgba(0,0,0,.09)}
.search-box{display:flex;align-items:center;gap:6px;background:#f2f1ee;border-radius:6px;padding:6px 9px}
.search-box input{border:none;background:transparent;font-size:12px;color:#1a1a18;outline:none;width:100%;font-family:inherit}
.search-box i{color:#9e9d98;font-size:14px}
.case-list{overflow-y:auto;flex:1}
.case-row{padding:11px 14px;border-bottom:1px solid rgba(0,0,0,.07);cursor:pointer;transition:background .1s}
.case-row:hover{background:#f8f7f4}
.case-row.on{background:#eef3fb;border-left:3px solid #1a4a8a}
.cr-ti{font-size:12px;font-weight:600;color:#1a1a18}
.cr-me{font-size:11px;color:#6b6a65;margin-top:3px}
.cr-fo{display:flex;align-items:center;justify-content:space-between;margin-top:5px}
.cr-al{font-size:10px;color:#8a4f0a;display:flex;align-items:center;gap:3px}

/* CASO DETALLE */
.case-detail{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#f8f7f4;min-width:0}
.cdh{background:#fff;border-bottom:1px solid rgba(0,0,0,.09);padding:16px 20px 14px;flex-shrink:0}
.cdt{display:flex;align-items:flex-start;justify-content:space-between;gap:12px}
.cd-ti{font-size:19px;font-weight:700;letter-spacing:-.02em}
.cd-ba{display:flex;gap:6px;margin-top:7px;flex-wrap:wrap}
.cd-ac{display:flex;gap:6px;flex-shrink:0}
.alert-bar{background:#fef4e6;border:1px solid rgba(138,79,10,.2);border-radius:6px;padding:9px 14px;margin:10px 20px 0;display:flex;align-items:center;gap:9px;font-size:12px;color:#8a4f0a;flex-shrink:0}
.alert-bar i{font-size:15px;flex-shrink:0}
.ab-ac{margin-left:auto;display:flex;gap:6px}
.ab-b{font-size:11px;padding:3px 9px;border-radius:6px;border:1px solid rgba(138,79,10,.3);background:transparent;color:#8a4f0a;cursor:pointer;font-family:inherit}
.ab-bp{background:#8a4f0a;color:#fff;border-color:#8a4f0a}
.det-tabs{display:flex;padding:0 20px;background:#fff;border-bottom:1px solid rgba(0,0,0,.09);flex-shrink:0;overflow-x:auto}
.dt{padding:10px 12px;font-size:13px;color:#6b6a65;cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;display:flex;align-items:center;gap:5px;white-space:nowrap}
.dt:hover{color:#1a1a18}
.dt.on{color:#1a4a8a;border-bottom-color:#1a4a8a;font-weight:500}
.dt .tc{font-size:10px;background:#f2f1ee;border-radius:99px;padding:0 5px;color:#9e9d98}
.det-body{flex:1;overflow-y:auto;padding:18px 20px}
.dpanel{display:none}
.dpanel.on{display:block}
.info-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.ifield{background:#fff;border-radius:10px;padding:12px 14px;border:1px solid rgba(0,0,0,.09)}
.ifl{font-size:10px;color:#9e9d98;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.ifv{font-size:13px;color:#1a1a18;margin-top:4px;font-weight:500}
.ifv.mu{color:#6b6a65;font-weight:400;font-style:italic}
.sec-t{font-size:11px;font-weight:600;color:#9e9d98;text-transform:uppercase;letter-spacing:.07em;margin:16px 0 8px}
.people-row{display:flex;gap:8px;flex-wrap:wrap}
.pchip{display:flex;align-items:center;gap:8px;background:#fff;border:1px solid rgba(0,0,0,.09);border-radius:10px;padding:8px 12px;cursor:pointer;transition:all .12s}
.pchip:hover{border-color:rgba(0,0,0,.2)}
.pcn{font-size:12px;font-weight:500}
.pcr{font-size:10px;color:#9e9d98}
.add-chip{display:flex;align-items:center;gap:6px;background:transparent;border:1px dashed rgba(0,0,0,.2);border-radius:10px;padding:8px 12px;cursor:pointer;font-size:12px;color:#6b6a65;transition:all .12s}
.add-chip:hover{border-color:#1a4a8a;color:#1a4a8a}
.doc-list{display:flex;flex-direction:column;gap:6px}
.doc-item{display:flex;align-items:center;gap:11px;padding:10px 14px;border:1px solid rgba(0,0,0,.09);border-radius:10px;background:#fff;cursor:pointer;transition:all .12s}
.doc-item:hover{border-color:rgba(0,0,0,.2)}
.d-icon{width:36px;height:36px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.d-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.d-meta{font-size:11px;color:#6b6a65;margin-top:2px}
.d-right{display:flex;align-items:center;gap:8px;flex-shrink:0}
.vis-b{font-size:10px;padding:2px 8px;border-radius:99px}
.vp{background:#f2f1ee;color:#6b6a65;border:1px solid rgba(0,0,0,.09)}
.vs{background:#eaf5ee;color:#1a6e3c}
.d-act{display:flex;gap:4px}
.upload-zone{margin-top:8px;border:1px dashed rgba(0,0,0,.2);border-radius:10px;padding:14px;text-align:center;color:#6b6a65;font-size:12px;cursor:pointer;transition:all .12s}
.upload-zone:hover{border-color:#1a4a8a;color:#1a4a8a;background:#eef3fb}
.plazo-list{display:flex;flex-direction:column;gap:8px}
.plazo-item{display:flex;align-items:center;gap:14px;padding:12px 16px;border:1px solid rgba(0,0,0,.09);border-radius:10px;background:#fff}
.plazo-item.urgente{border-left:3px solid #8a1a1a}
.plazo-item.proximo{border-left:3px solid #d4870a}
.p-date{text-align:center;min-width:42px}
.p-day{font-size:22px;font-weight:700;line-height:1}
.p-mon{font-size:10px;color:#9e9d98;text-transform:uppercase}
.p-ti{font-size:13px;font-weight:500}
.p-su{font-size:11px;color:#6b6a65;margin-top:2px}
.p-right{margin-left:auto;display:flex;align-items:center;gap:8px}
.days-b{font-size:11px;padding:3px 9px;border-radius:99px;font-weight:500}
.dbu{background:#feeeed;color:#8a1a1a}
.dbp{background:#fef4e6;color:#8a4f0a}
.dbn{background:#f2f1ee;color:#6b6a65}
.hist-list{display:flex;flex-direction:column}
.hitem{display:flex;gap:12px;padding:10px 0;border-bottom:1px solid rgba(0,0,0,.07)}
.hitem:last-child{border-bottom:none}
.hdot-col{display:flex;flex-direction:column;align-items:center;padding-top:4px}
.hdot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.hline{width:1px;flex:1;background:rgba(0,0,0,.09);margin-top:4px;min-height:12px}
.hitem:last-child .hline{display:none}
.ht{font-size:13px;line-height:1.4}
.hm{font-size:11px;color:#9e9d98;margin-top:3px}
.nota-area{width:100%;border:1px solid rgba(0,0,0,.09);border-radius:10px;padding:12px 14px;font-size:13px;font-family:inherit;color:#1a1a18;background:#fff;resize:none;outline:none;line-height:1.6;transition:border .12s}
.nota-area:focus{border-color:#1a4a8a}
.nota-foot{display:flex;justify-content:flex-end;margin-top:8px}

/* KANBAN */
.kanban-wrap{flex:1;overflow-x:auto;padding:16px 20px;display:flex;gap:12px;align-items:flex-start;height:100%}
.kol{flex-shrink:0;width:210px}
.kol-h{font-size:11px;font-weight:600;color:#6b6a65;text-transform:uppercase;letter-spacing:.06em;padding:0 2px 10px;display:flex;justify-content:space-between;align-items:center}
.kol-cnt{font-size:10px;background:#f2f1ee;border-radius:99px;padding:1px 7px;color:#9e9d98;border:1px solid rgba(0,0,0,.09)}
.kol-body{display:flex;flex-direction:column;gap:8px}
.kcard{background:#fff;border:1px solid rgba(0,0,0,.09);border-radius:10px;padding:11px 13px;cursor:pointer;transition:all .15s}
.kcard:hover{border-color:#1a4a8a;box-shadow:0 2px 8px rgba(26,74,138,.1);transform:translateY(-1px)}
.kcard.kal{border-left:3px solid #8a4f0a}
.kc-ti{font-size:13px;font-weight:600;line-height:1.3}
.kc-ma{font-size:11px;color:#9e9d98;margin-top:3px}
.kc-al{font-size:10px;color:#8a4f0a;display:flex;align-items:center;gap:3px;margin-top:6px}
.kc-fo{margin-top:9px;display:flex;align-items:center;justify-content:space-between}
.kc-ab{display:flex;align-items:center;gap:5px}
.mav{width:20px;height:20px;border-radius:50%;font-size:8px;font-weight:600;display:flex;align-items:center;justify-content:center}
.kc-abn{font-size:11px;color:#6b6a65}

/* PAGE SCROLL */
.page{flex:1;overflow-y:auto;padding:20px 24px;height:100%}

/* DASHBOARD */
.dash-stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:20px}
.stat-card{background:#fff;border:1px solid rgba(0,0,0,.09);border-radius:10px;padding:16px 18px}
.sc-l{font-size:11px;color:#9e9d98;text-transform:uppercase;letter-spacing:.06em;font-weight:600}
.sc-v{font-size:28px;font-weight:700;margin-top:4px;letter-spacing:-.02em}
.sc-s{font-size:11px;color:#9e9d98;margin-top:3px}
.sc-s.up{color:#1a6e3c}
.sc-s.wn{color:#8a4f0a}
.dash-row{display:grid;grid-template-columns:1.4fr 1fr;gap:16px}
.dash-card{background:#fff;border:1px solid rgba(0,0,0,.09);border-radius:10px;padding:16px 18px}
.dc-ti{font-size:13px;font-weight:600;margin-bottom:14px;display:flex;align-items:center;justify-content:space-between}
.dc-ti span{font-size:11px;color:#1a4a8a;font-weight:400;cursor:pointer}
.act-item{display:flex;gap:10px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.07)}
.act-item:last-child{border-bottom:none}
.act-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.act-t{font-size:12px;line-height:1.4}
.act-m{font-size:11px;color:#9e9d98;margin-top:1px}
.abog-row{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid rgba(0,0,0,.07)}
.abog-row:last-child{border-bottom:none}
.abog-n{font-size:12px;font-weight:500}
.abog-c{font-size:11px;color:#9e9d98}
.bar-bg{background:#f2f1ee;border-radius:99px;height:6px;flex:1}
.bar-fill{border-radius:99px;height:6px;background:#1a4a8a}

/* CLIENTES */
.client-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}
.cc{background:#fff;border:1px solid rgba(0,0,0,.09);border-radius:10px;padding:16px;cursor:pointer;transition:all .12s}
.cc:hover{border-color:rgba(0,0,0,.2);box-shadow:0 2px 8px rgba(0,0,0,.06)}
.cc-top{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.cc-av{width:40px;height:40px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;flex-shrink:0}
.cc-n{font-size:14px;font-weight:600}
.cc-t{font-size:11px;color:#9e9d98;margin-top:1px}
.cc-stats{display:flex;gap:14px;margin-bottom:10px}
.cc-st{text-align:center}
.sv{font-size:16px;font-weight:700}
.sl{font-size:10px;color:#9e9d98}
.cc-tags{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.tag-c{font-size:10px;padding:2px 7px;border-radius:99px;background:#f2f1ee;color:#6b6a65;border:1px solid rgba(0,0,0,.09)}
.cc-last{font-size:11px;color:#9e9d98;border-top:1px solid rgba(0,0,0,.07);padding-top:9px;margin-top:6px}

/* AGENDA */
.ag-wrap{display:flex;flex:1;overflow:hidden;height:100%}
.ag-cal{width:280px;flex-shrink:0;border-right:1px solid rgba(0,0,0,.09);background:#fff;padding:16px;overflow-y:auto}
.cal-m{font-size:14px;font-weight:600;text-align:center;margin-bottom:12px;display:flex;align-items:center;justify-content:space-between}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:2px}
.cal-dl{font-size:10px;color:#9e9d98;text-align:center;padding:4px 0;font-weight:600}
.cal-d{font-size:12px;text-align:center;padding:6px 4px;border-radius:6px;cursor:pointer;color:#6b6a65;position:relative}
.cal-d:hover{background:#f2f1ee}
.cal-d.tod{background:#1a4a8a;color:#fff;font-weight:600}
.cal-d.he::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:#8a4f0a}
.cal-d.tod.he::after{background:#fff}
.ag-events{flex:1;overflow-y:auto;padding:16px 20px}
.ag-dl{font-size:12px;font-weight:600;color:#9e9d98;text-transform:uppercase;letter-spacing:.07em;margin:16px 0 8px}
.ag-dl:first-child{margin-top:0}
.ev{display:flex;gap:14px;background:#fff;border:1px solid rgba(0,0,0,.09);border-radius:10px;padding:12px 16px;margin-bottom:8px;cursor:pointer;transition:all .12s}
.ev:hover{border-color:rgba(0,0,0,.2)}
.ev.urg{border-left:3px solid #8a1a1a}
.ev.nor{border-left:3px solid #1a4a8a}
.ev-t{font-size:12px;font-weight:600;color:#6b6a65;min-width:52px;padding-top:1px}
.ev-ti{font-size:13px;font-weight:600}
.ev-c{font-size:11px;color:#6b6a65;margin-top:2px}
.ev-b{font-size:10px;padding:2px 8px;border-radius:99px;margin-top:5px;display:inline-block}

/* USUARIOS */
.users-tbl{background:#fff;border:1px solid rgba(0,0,0,.09);border-radius:10px;overflow:hidden}
.ut-head{display:grid;grid-template-columns:2fr 1.2fr 1fr 1fr 80px;background:#f2f1ee;border-bottom:1px solid rgba(0,0,0,.09);padding:10px 16px}
.ut-head span{font-size:11px;font-weight:600;color:#9e9d98;text-transform:uppercase;letter-spacing:.06em}
.ut-row{display:grid;grid-template-columns:2fr 1.2fr 1fr 1fr 80px;padding:12px 16px;border-bottom:1px solid rgba(0,0,0,.07);align-items:center;transition:background .1s;cursor:pointer}
.ut-row:last-child{border-bottom:none}
.ut-row:hover{background:#f8f7f4}
.ut-u{display:flex;align-items:center;gap:9px}
.ut-n{font-size:13px;font-weight:500}
.ut-e{font-size:11px;color:#9e9d98}
.rb{font-size:10px;padding:3px 9px;border-radius:99px;font-weight:500}
.rba{background:#eef3fb;color:#1a4a8a}
.rbb{background:#eaf5ee;color:#1a6e3c}
.rbc{background:#fef4e6;color:#8a4f0a}
.ut-c{font-size:12px;color:#6b6a65}
.ut-a{display:flex;gap:4px}

/* MODAL */
.modal-over{position:fixed;inset:0;background:rgba(0,0,0,.35);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .18s}
.modal-over.on{opacity:1;pointer-events:all}
.modal{background:#fff;border-radius:14px;width:800px;max-width:96vw;max-height:90vh;display:flex;flex-direction:column;overflow:hidden;transform:scale(.97);transition:transform .18s;box-shadow:0 20px 60px rgba(0,0,0,.18)}
.modal-over.on .modal{transform:scale(1)}
.modal-hdr{padding:18px 22px 14px;border-bottom:1px solid rgba(0,0,0,.09);flex-shrink:0}
.modal-top{display:flex;align-items:flex-start;justify-content:space-between}
.modal-ti{font-size:18px;font-weight:700;letter-spacing:-.02em}
.modal-cl{width:32px;height:32px;border-radius:6px;border:1px solid rgba(0,0,0,.09);background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:#6b6a65;font-size:16px;transition:all .12s}
.modal-cl:hover{background:#f2f1ee}
.modal-ba{display:flex;gap:6px;margin-top:8px}
.modal-ac{display:flex;gap:6px}
.modal-body{flex:1;overflow-y:auto;display:flex;flex-direction:column}
.modal-tabs{display:flex;padding:0 22px;background:#fff;border-bottom:1px solid rgba(0,0,0,.09);flex-shrink:0;overflow-x:auto}
.mta{padding:10px 13px;font-size:13px;color:#6b6a65;cursor:pointer;border-bottom:2px solid transparent;transition:all .12s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.mta.on{color:#1a4a8a;border-bottom-color:#1a4a8a;font-weight:500}
.modal-con{padding:18px 22px;flex:1;overflow-y:auto}
.mp{display:none}
.mp.on{display:block}

function buildCaseList(filter=''){
  const list=CASOS.filter(c=>!filter||c.ti.toLowerCase().includes(filter.toLowerCase())||c.ma.toLowerCase().includes(filter.toLowerCase()));
  document.getElementById('case-list').innerHTML=list.map(c=>`
    <div class="case-row${c.id===activeCase?' on':''}" onclick="selCase(${c.id})">
      <div class="cr-ti">${c.ti}</div>
      <div class="cr-me">${c.ma}${c.pe[0]?' · '+c.pe[0].n:' · Sin abogado'}</div>
      <div class="cr-fo"><span class="pill ${c.pi}">${c.es}</span>${c.al?'<span class="cr-al"><i class="ti ti-alert-triangle"></i> SATJE</span>':''}</div>
    </div>`).join('');
}

function sv(view, btn){
  activeView=view;
  document.querySelectorAll('.vb').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('v-list').classList.toggle('hidden',view!=='list');
  document.getElementById('v-kanban').classList.toggle('hidden',view!=='kanban');
  if(view==='kanban')buildKanban();
}

function showOnly(viewId){
  ALL_VIEWS.forEach(v=>document.getElementById(v).classList.add('hidden'));
  document.getElementById(viewId).classList.remove('hidden');
}

function go(sec, el){
  currentSection=sec;
  document.querySelectorAll('.ni').forEach(n=>n.classList.remove('on'));
  el.classList.add('on');
  const tvw=document.getElementById('tvw');
  const tba=document.getElementById('tba');
  const bfi=document.getElementById('btn-filter');
  const titles={dash:'Dashboard',casos:'Casos',clientes:'Clientes',agenda:'Agenda',usuarios:'Usuarios y roles',drive:'Google Drive',config:'Configuración'};
  const actions={casos:'Nuevo caso',clientes:'Nuevo cliente',agenda:'Nuevo evento',usuarios:'Invitar usuario'};
  document.getElementById('tbt').textContent=titles[sec];
  tvw.style.display=sec==='casos'?'flex':'none';
  bfi.style.display=sec==='casos'?'inline-flex':'none';
  if(actions[sec]){tba.style.display='inline-flex';tba.innerHTML=`<i class="ti ti-plus"></i> ${actions[sec]}`;}
  else tba.style.display='none';
  if(sec==='casos'){
    showOnly(activeView==='kanban'?'v-kanban':'v-list');
    if(activeView==='kanban')buildKanban();
  } else if(sec==='dash'){showOnly('v-dash');buildDash();}
  else if(sec==='clientes'){showOnly('v-clientes');buildClientes();}
  else if(sec==='agenda'){showOnly('v-agenda');buildAgenda();}
  else if(sec==='usuarios'){showOnly('v-usuarios');buildUsuarios();}
  else if(sec==='drive'){showOnly('v-drive');buildDrive();}
  else if(sec==='config'){showOnly('v-config');buildConfig();}
}
